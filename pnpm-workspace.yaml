packages:
  - "apps/*"
  - "packages/*"
allowBuilds:
  "@scarf/scarf": true
  argon2: true
  esbuild: true
  sharp: true
blockExoticSubdeps: true
minimumReleaseAge: 10080
# Dependência transitiva do gerador de cobertura, revisada e travada no lockfile.
minimumReleaseAgeExclude:
  - ast-v8-to-istanbul
trustPolicy: no-downgrade
overrides:
  multer: 2.2.0
  brace-expansion@1.1.15: 1.1.16
  postcss: 8.5.16
