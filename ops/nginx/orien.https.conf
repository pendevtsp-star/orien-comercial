server {
    listen 80;
    listen [::]:80;
    server_name useorien.com.br;
    return 301 https://useorien.com.br$request_uri;
}

server {
    listen 80;
    listen [::]:80;
    server_name app.useorien.com.br;
    return 301 https://app.useorien.com.br$request_uri;
}

server {
    listen 80;
    listen [::]:80;
    server_name admin.useorien.com.br;
    return 301 https://admin.useorien.com.br$request_uri;
}

server {
    listen 80;
    listen [::]:80;
    server_name api.useorien.com.br;
    return 301 https://api.useorien.com.br$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name useorien.com.br;

    ssl_certificate /etc/letsencrypt/live/useorien.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/useorien.com.br/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header X-Frame-Options SAMEORIGIN always;

    location / {
        proxy_pass http://127.0.0.1:3101;
        include proxy_params;
        proxy_set_header Host useorien.com.br;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name admin.useorien.com.br;

    ssl_certificate /etc/letsencrypt/live/useorien.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/useorien.com.br/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header X-Frame-Options DENY always;

    location / {
        proxy_pass http://127.0.0.1:3102;
        include proxy_params;
        proxy_set_header Host admin.useorien.com.br;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name app.useorien.com.br;

    ssl_certificate /etc/letsencrypt/live/useorien.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/useorien.com.br/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header X-Frame-Options SAMEORIGIN always;

    location / {
        proxy_pass http://127.0.0.1:3100;
        include proxy_params;
        proxy_set_header Host app.useorien.com.br;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.useorien.com.br;

    ssl_certificate /etc/letsencrypt/live/useorien.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/useorien.com.br/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header X-Frame-Options DENY always;

    location = /health {
        proxy_pass http://127.0.0.1:3334/health;
        include proxy_params;
    }

    location / {
        proxy_pass http://127.0.0.1:3334;
        include proxy_params;
        proxy_set_header Host api.useorien.com.br;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
