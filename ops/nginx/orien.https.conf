server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.useorien.com.br;

    ssl_certificate /etc/letsencrypt/live/useorien.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/useorien.com.br/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header X-Frame-Options DENY always;

    location = /health {
        proxy_pass http://127.0.0.1:3334/health;
        include proxy_params;
    }

    location / {
        proxy_pass http://127.0.0.1:3334;
        include proxy_params;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
