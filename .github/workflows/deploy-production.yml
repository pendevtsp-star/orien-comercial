name: Deploy de producao

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      confirmar_producao:
        description: Digite PUBLICAR para confirmar a release
        required: true
        type: string
      versao:
        description: Versao semantica opcional, por exemplo v1.23.0
        required: false
        type: string

concurrency:
  group: orien-production
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/orien-comercial

jobs:
  validate:
    name: Validar release
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.inputs.confirmar_producao == 'PUBLICAR'
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: orien_e2e
          POSTGRES_USER: sgc_owner
          POSTGRES_PASSWORD: sgc_owner_password
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U sgc_owner -d orien_e2e"
          --health-interval 10s --health-timeout 5s --health-retries 10
      redis:
        image: redis:8-alpine
        ports: ["6379:6379"]
    env:
      NODE_ENV: test
      APP_ENV: e2e
      DATABASE_URL: postgresql://sgc_owner:sgc_owner_password@localhost:5432/orien_e2e
      DATABASE_MIGRATION_URL: postgresql://sgc_owner:sgc_owner_password@localhost:5432/orien_e2e
      REDIS_URL: redis://localhost:6379
      COOKIE_SECURE: "false"
      JWT_ACCESS_SECRET: e2e-access-secret-at-least-thirty-two-chars
      JWT_REFRESH_SECRET: e2e-refresh-secret-at-least-thirty-two-chars
      COOKIE_SECRET: e2e-cookie-secret-at-least-thirty-two-chars
      PASSWORD_PEPPER: e2e-password-pepper
      INTEGRATIONS_ENCRYPTION_KEY: e2e-integrations-key-at-least-thirty-two
      PLATFORM_OWNER_EMAIL: e2e@orien.test
      PLATFORM_OWNER_PASSWORD: E2eOwner123!
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa
        with:
          version: 11.7.0
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r --filter "./packages/*" --sort build
      - run: pnpm lint
      - run: pnpm lint:copy
      - run: pnpm test
      - run: pnpm db:migrate
      - run: pnpm test:e2e
      - run: pnpm build

  publish-images:
    name: Publicar imagens imutaveis
    needs: validate
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.value }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: version
        run: echo "value=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ${{ env.IMAGE_PREFIX }}-api:${{ github.sha }}
      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          build-args: NEXT_PUBLIC_API_URL=https://api.useorien.com.br/api/v1
          tags: ${{ env.IMAGE_PREFIX }}-web:${{ github.sha }}
      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: .
          file: apps/marketing/Dockerfile
          push: true
          tags: ${{ env.IMAGE_PREFIX }}-marketing:${{ github.sha }}
      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: .
          file: apps/admin/Dockerfile
          push: true
          build-args: NEXT_PUBLIC_API_URL=https://api.useorien.com.br/api/v1
          tags: ${{ env.IMAGE_PREFIX }}-admin:${{ github.sha }}

  deploy:
    name: Publicar na VPS
    needs: publish-images
    # O runner fica na propria VPS. Assim o deploy nao depende de SSH vindo
    # de IPs dinamicos dos runners hospedados pelo GitHub.
    runs-on: self-hosted
    environment: production
    steps:
      - name: Publicar release local
        env:
          VERSION: ${{ needs.publish-images.outputs.version }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN_ORIEN: ${{ secrets.GHCR_TOKEN_ORIEN }}
        shell: bash
        run: |
          set -euo pipefail
          ROOT=/srv/apps/orien_comercial
          APP=$ROOT/app
          [ -d "$APP" ] || { echo "[deploy] Diretorio da aplicacao nao encontrado: $APP"; exit 10; }
          cd "$APP"

          cat > docker-compose.ghcr.yml <<'EOF'
          services:
            migrate:
              image: ${ORIEN_API_IMAGE}
              build: null
            api:
              image: ${ORIEN_API_IMAGE}
              build: null
            worker:
              image: ${ORIEN_API_IMAGE}
              build: null
            web:
              image: ${ORIEN_WEB_IMAGE}
              build: null
            marketing:
              image: ${ORIEN_MARKETING_IMAGE}
              build: null
            admin:
              image: ${ORIEN_ADMIN_IMAGE}
              build: null
          EOF

          [ -f .env ] || { echo "[deploy] Arquivo .env nao encontrado em $APP"; exit 11; }
          [ -f docker-compose.prod.yml ] || { echo "[deploy] docker-compose.prod.yml nao encontrado em $APP"; exit 12; }
          [ -f docker-compose.ghcr.yml ] || { echo "[deploy] docker-compose.ghcr.yml nao encontrado em $APP"; exit 13; }
          [ -w "$APP" ] || { echo "[deploy] Runner sem permissao de escrita em $APP"; exit 14; }
          [ -w "$ROOT/backups" ] || { echo "[deploy] Runner sem permissao de escrita em $ROOT/backups"; exit 15; }
          docker info >/dev/null || { echo "[deploy] Runner sem acesso ao Docker"; exit 16; }
          echo "[deploy] Pre-requisitos remotos validados para $APP"

          timestamp=$(date -u +%Y%m%dT%H%M%SZ)
          docker compose --env-file .env -f docker-compose.prod.yml \
            exec -T postgres pg_dump -U sgc_owner sgc | gzip > "$ROOT/backups/predeploy-${timestamp}-${VERSION}.sql.gz"
          test -s "$ROOT/backups/predeploy-${timestamp}-${VERSION}.sql.gz"

          if [ -f .release.env ]; then cp .release.env .release.env.previous; fi
          cat > .release.env <<EOF
          ORIEN_API_IMAGE=ghcr.io/pendevtsp-star/orien-comercial-api:${VERSION}
          ORIEN_WEB_IMAGE=ghcr.io/pendevtsp-star/orien-comercial-web:${VERSION}
          ORIEN_MARKETING_IMAGE=ghcr.io/pendevtsp-star/orien-comercial-marketing:${VERSION}
          ORIEN_ADMIN_IMAGE=ghcr.io/pendevtsp-star/orien-comercial-admin:${VERSION}
          PRODUCTION_VERSION=${VERSION}
          EOF

          echo "$GHCR_TOKEN_ORIEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
          compose="docker compose --env-file .env --env-file .release.env -f docker-compose.prod.yml -f docker-compose.ghcr.yml"
          $compose pull api worker web marketing admin migrate
          $compose run --rm migrate
          $compose up -d --remove-orphans api worker web marketing admin

          wait_for_service() {
            name="$1"
            url="$2"
            for attempt in $(seq 1 24); do
              if curl -fsS --max-time 5 "$url" >/dev/null; then
                echo "[deploy] $name saudavel"
                return 0
              fi
              sleep 5
            done
            echo "[deploy] $name nao respondeu em 120 segundos: $url"
            $compose ps
            return 1
          }

          wait_for_service api http://127.0.0.1:3334/health
          wait_for_service web http://127.0.0.1:3100
          wait_for_service marketing http://127.0.0.1:3101
          wait_for_service admin http://127.0.0.1:3102
          $compose ps

  notify-telegram:
    name: Notificar resultado no Telegram
    runs-on: ubuntu-latest
    needs:
      - validate
      - publish-images
      - deploy
    if: always()

    steps:
      - name: Enviar notificacao Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          VALIDATE_RESULT: ${{ needs.validate.result }}
          PUBLISH_RESULT: ${{ needs.publish-images.result }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
          COMMIT_SHA: ${{ github.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -eu

          if [ -z "${TELEGRAM_BOT_TOKEN:-}" ] || [ -z "${TELEGRAM_CHAT_ID:-}" ]; then
            echo "[telegram] Secrets TELEGRAM_BOT_TOKEN/TELEGRAM_CHAT_ID ausentes. Notificacao ignorada."
            exit 0
          fi

          if [ "$DEPLOY_RESULT" = "success" ]; then
            status="[OK] Deploy Orien concluido"
          else
            status="[ERRO] Deploy Orien falhou"
          fi

          message="$status
          Validacao: $VALIDATE_RESULT
          Publish: $PUBLISH_RESULT
          Deploy: $DEPLOY_RESULT
          Commit: $COMMIT_SHA
          Run: $RUN_URL"

          curl -fsS \
            -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "disable_web_page_preview=true" \
            --data-urlencode "text=${message}"
