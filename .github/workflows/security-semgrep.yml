name: Security - Semgrep

on:
  pull_request:
  push:
    branches: [master, main]
  schedule:
    - cron: "15 2 * * 0"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  scan:
    name: SAST TypeScript
    runs-on: ubuntu-24.04
    env:
      SEMGREP_ENFORCE: ${{ vars.SECURITY_ENFORCE == 'true' && '--error' || '' }}
    steps:
      - uses: actions/checkout@v5

      - name: Executar Semgrep
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/src" \
            -w /src \
            semgrep/semgrep:1.157.0 \
            semgrep scan --metrics=off $SEMGREP_ENFORCE --sarif --output semgrep.sarif \
            --config p/security-audit \
            --config p/javascript \
            --config p/typescript \
            --config p/owasp-top-ten

      - name: Guardar resultado Semgrep
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-sarif
          path: semgrep.sarif
          if-no-files-found: warn
          retention-days: 30

      - name: Publicar resultado no Code Scanning
        if: always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif
          category: semgrep
