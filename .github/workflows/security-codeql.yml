name: Security - CodeQL

on:
  pull_request:
  push:
    branches: [master, main]
  schedule:
    - cron: "15 4 * * 0"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analise JavaScript e TypeScript
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Inicializar CodeQL
        uses: github/codeql-action/init@eec0bff2f6c15bf3f1e8a0152f94d17664a06a06
        with:
          languages: ${{ matrix.language }}
          build-mode: none
          queries: security-extended,security-and-quality
          dependency-caching: full

      - name: Analisar codigo
        uses: github/codeql-action/analyze@eec0bff2f6c15bf3f1e8a0152f94d17664a06a06
        with:
          category: /language:${{ matrix.language }}
