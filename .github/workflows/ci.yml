name: CI

on:
  pull_request:
  push:
    branches: ["master", "main", "codex/**"]

jobs:
  quality:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: sgc
          POSTGRES_USER: sgc_owner
          POSTGRES_PASSWORD: sgc_owner_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sgc_owner -d sgc"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:8-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa
        with:
          version: 11.7.0
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r --filter "./packages/*" --sort build
      - run: pnpm security:artifacts
      - run: pnpm lint
      - run: pnpm lint:copy
      - run: pnpm test
      - run: pnpm build
