name: CI

on:
  pull_request:
  push:
    branches: ["master", "main", "codex/**"]

jobs:
  quality:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: sgc
          POSTGRES_USER: sgc_owner
          POSTGRES_PASSWORD: sgc_owner_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sgc_owner -d sgc"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:8-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm lint:copy
      - run: pnpm test
      - run: pnpm build
